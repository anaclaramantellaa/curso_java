<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n1, n2;

        n1 = parseInt(prompt("Informe um número qualquer: "));
        n2 = parseInt(prompt("Informe outro número qualquer: "));

        if (n1 > n2 ){
            alert("O maior valor é o primeiro número " + n1)
        }else{
            alert("O maior valor é o segundo número " + n2)
        }
    </script>
</body>
</html>

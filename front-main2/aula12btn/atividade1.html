<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .btn{
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 5px 5px 5px black;
            border: 2px solid red;
        }
        .btn1{
            margin-top: 10px;
            padding: 10px 20px;
            background: linear-gradient(45deg, red,blue,green);
            border: none;
            border-radius: 5px;
            box-shadow: 5px 5px 5px darkblue;
        }
        .btn2{
            padding: 10px 20px;
            margin-top: 10px;
            background: linear-gradient(180deg, red, blue, purple);
            border: 2px solid black;
            border-radius: 10px;
            font-size: large;
            cursor: pointer;
            color: #fff;
            box-shadow: 5px 5px 5px black;
            font-family: Arial, Helvetica, sans-serif;

        }
    </style>
</head>
<body>
    <button class="btn">botão 1</button><br>
    <button class="btn1">botão 2</button><br>
    <button class="btn2">botão 3</button>

</body>
</html>

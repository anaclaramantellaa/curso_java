<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            width: 100vw;
            background-color: darkblue;
        }
        button{
            position: relative;
            top: 50%;
            left: 50%;
            background: linear-gradient(45deg, red, yellow,green);
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 5px 5px 5px black;
            font-size: larger;
            font-family: Arial, Helvetica, sans-serif;

        }
   
    </style>
</head>
<body>
    <button onmouseover="mover()" class="btn">Clique aqui!</button>
    <script>
        let btn = document.querySelector('button')
        let x,y
        function mover() {
            btn.style.display = "none";
            novaPosicao()
        }
        function novaPosicao(){
            x = Math.floor(Math.random() * (1200-50) + 50);
            x = Math.floor(Math.random() * (600-50) + 50);
            btn.style.left = x + "px"
            btn.style.top = y + "px"
            btn.style.display = "block"

        }
    </script>
</body>
</html>
